<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive PYQ Portal</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            /* Default Theme Variables (Beautiful Glassmorphism) */
            --bg-main: #050505;
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --primary-color: #38bdf8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --panel-bg: rgba(15, 23, 42, 0.85);
            --glass-blur: blur(20px);
        }

        /* --- PERFORMANCE THEMES (Flat, Fast, No Blurs) --- */
        [data-theme="midnight"] {
            --bg-main: #000000;
            --text-main: #e2e8f0;
            --primary-color: #10b981;
            --glass-bg: #111111;
            --glass-border: #333333;
            --glass-shadow: none;
            --panel-bg: #111111;
            --glass-blur: none; 
        }
        [data-theme="midnight"] .bg-blobs { display: none; }

        [data-theme="vibrant"] {
            --bg-main: #2e0249;
            --text-main: #ffffff;
            --primary-color: #ff007f;
            --glass-bg: #4a0072;
            --glass-border: #ff007f;
            --glass-shadow: none;
            --panel-bg: #3a005c;
            --glass-blur: none;
        }
        [data-theme="vibrant"] .bg-blobs { display: none; }

        [data-theme="paper"] {
            --bg-main: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary-color: #2563eb;
            --glass-bg: #ffffff;
            --glass-border: #cbd5e1;
            --glass-shadow: 0 4px 6px rgba(0,0,0,0.05);
            --panel-bg: #ffffff;
            --glass-blur: none;
        }
        [data-theme="paper"] .bg-blobs { display: none; }
        [data-theme="paper"] .chapter-btn { color: #0f172a; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-main); 
            color: var(--text-main);
            margin: 0; padding: 0; line-height: 1.6;
            overflow-x: hidden; min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        /* --- Animated Background Blobs --- */
        .bg-blobs { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; overflow: hidden; }
        .blob {
            position: absolute; filter: blur(100px); opacity: 0.35; border-radius: 50%;
            animation: float 25s infinite ease-in-out alternate; will-change: transform;
        }
        .blob-1 { width: 80vw; height: 80vw; background: #3b82f6; top: -10%; left: -20%; animation-delay: 0s; }
        .blob-2 { width: 70vw; height: 70vw; background: #8b5cf6; bottom: -10%; right: -20%; animation-delay: -5s; }
        .blob-3 { width: 75vw; height: 75vw; background: #ec4899; top: 30%; left: 10%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(3%, 3%) scale(1.05); }
        }

        /* --- Layout & Navbar --- */
        .navbar {
            background: var(--panel-bg); 
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border); padding: 16px 20px;
            position: sticky; top: 0; z-index: 90;
            display: flex; justify-content: space-between; align-items: center;
        }

        .navbar-brand { display: flex; align-items: center; gap: 15px; }
        
        .icon-btn {
            background: transparent; border: 1px solid var(--glass-border);
            color: var(--text-main); font-size: 1.3rem; padding: 6px 12px; border-radius: 8px;
            cursor: pointer; backdrop-filter: var(--glass-blur); transition: all 0.2s;
        }

        .navbar h1 {
            margin: 0; font-size: 1.3rem; font-weight: 700;
            color: var(--primary-color);
        }

        .container { max-width: 800px; margin: 30px auto; padding: 0 15px; }

        /* --- Sidebars (Left for Chapters, Right for Palette) --- */
        .sidebar {
            position: fixed; top: 0; height: 100vh;
            background: var(--panel-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            z-index: 999; transition: all 0.3s ease;
            display: flex; flex-direction: column; box-shadow: var(--glass-shadow);
        }
        
        /* Left Sidebar (Chapters) */
        .left-sidebar { left: -300px; width: 280px; border-right: 1px solid var(--glass-border); }
        .left-sidebar.open { left: 0; }
        
        /* Right Sidebar (Question Palette) */
        .right-sidebar { right: -350px; width: 320px; border-left: 1px solid var(--glass-border); }
        .right-sidebar.open { right: 0; }

        .sidebar-header {
            padding: 20px; border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar-header h2 { margin: 0; font-size: 1.2rem; color: var(--text-main); }
        .close-btn { background: transparent; border: none; color: #ff4b4b; font-size: 1.5rem; cursor: pointer; }
        
        .sidebar-content { padding: 20px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 10px; }
        
        .chapter-btn {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--text-main); padding: 15px; border-radius: 10px; text-align: left;
            font-size: 1rem; font-family: inherit; cursor: pointer; transition: all 0.2s;
        }
        .chapter-btn:hover, .chapter-btn.active { background: rgba(56, 189, 248, 0.2); border-color: var(--primary-color); }

        /* --- Question Palette Grid Styles --- */
        .palette-type-title {
            font-size: 0.9rem; font-weight: bold; color: var(--primary-color);
            margin: 15px 0 10px 0; border-bottom: 1px solid var(--glass-border); padding-bottom: 5px;
        }
        .palette-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        
        .grid-btn {
            width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--glass-border);
            background: var(--glass-bg); color: var(--text-main); font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 0.95rem; transition: all 0.2s;
        }
        .grid-btn:hover { border-color: var(--primary-color); }
        
        /* Colored states for the palette */
        .grid-btn.palette-correct { background: rgba(16, 185, 129, 0.4); border-color: #10b981; color: #fff; }
        .grid-btn.palette-wrong { background: rgba(255, 75, 75, 0.4); border-color: #ff4b4b; color: #fff; }

        /* --- Glass Cards & Typography --- */
        .loader-message { text-align: center; color: var(--text-muted); font-size: 1.2rem; margin-top: 50px; }
        
        .type-header {
            font-size: 1.5rem; font-weight: 700; color: var(--text-main); text-align: center;
            margin: 40px 0 20px 0; padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border); letter-spacing: 2px; opacity: 0.9;
        }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);
            border-radius: 16px; padding: 20px; margin-bottom: 24px;
            scroll-margin-top: 90px; /* Prevents sticky navbar from covering the question when scrolling! */
        }

        .question-text { font-size: 1.05rem; margin-bottom: 15px; }
        .question-image { 
            max-width: 100%; min-width: 250px; border-radius: 8px; 
            margin-bottom: 15px; border: 1px solid var(--glass-border); 
            background-color: #ffffff; padding: 10px; display: block; 
        }

        .exam-tag { text-align: right; font-size: 0.85rem; color: var(--text-muted); font-style: italic; margin-bottom: 20px; }

        /* --- Interactive Reveal & Navigation Buttons --- */
        .btn-primary {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(139, 92, 246, 0.15));
            border: 1px solid rgba(139, 92, 246, 0.3); color: var(--text-main);
            padding: 12px 20px; border-radius: 10px; cursor: pointer;
            font-weight: 600; width: 100%; transition: all 0.3s ease;
            font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary:hover { background: rgba(139, 92, 246, 0.3); }

        .answer-box {
            display: none; margin-top: 15px; padding: 16px;
            background: rgba(16, 185, 129, 0.15); border-left: 4px solid #10b981;
            border-radius: 6px; font-size: 1.05rem; animation: slideDown 0.3s ease-out;
        }
        .answer-box.visible { display: block; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* --- Options --- */
        .options-container { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; margin-bottom: 20px; }
        .option-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
            padding: 14px 18px; border-radius: 10px; color: var(--text-main); text-align: left;
            cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: space-between;
            align-items: center; font-family: inherit; font-size: 1rem;
        }
        .option-btn:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); }
        
        .option-btn.wrong { background: rgba(255, 75, 75, 0.15); border-color: rgba(255, 75, 75, 0.5); }
        .option-btn.correct { background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.5); pointer-events: none;}

        .status-icon { width: 22px; height: 22px; display: none; flex-shrink: 0; margin-left: 15px; }
        .option-btn.wrong .icon-cross { display: block; }
        .option-btn.correct .icon-tick { display: block; }
    </style>
</head>
<body>

<div class="bg-blobs">
    <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
</div>

<div id="navSidebar" class="sidebar left-sidebar">
    <div class="sidebar-header">
        <h2>Chapters</h2>
        <button class="close-btn" onclick="toggleSidebar()">✕</button>
    </div>
    <div class="sidebar-content" id="chapter-list"></div>
</div>

<div id="paletteSidebar" class="sidebar right-sidebar">
    <div class="sidebar-header">
        <h2>Question Palette</h2>
        <button class="close-btn" onclick="togglePalette()">✕</button>
    </div>
    <div class="sidebar-content" id="palette-content">
        </div>
</div>

<nav class="navbar">
    <div class="navbar-brand">
        <button class="icon-btn" onclick="toggleSidebar()" title="Chapters Menu">☰</button>
        <h1 id="chapter-title">Select a Chapter</h1>
    </div>
    <div>
        <button class="icon-btn" onclick="togglePalette()" title="Question Palette" style="margin-right: 5px;">🔢</button>
        <button class="icon-btn" onclick="randomizeTheme()" title="Switch Theme">🎨</button>
    </div>
</nav>

<div class="container" id="content-container">
    <div class="loader-message">Open the menu (☰) to select a chapter.</div>
</div>

<script>
    // ==========================================
    // ⚙️ THE REGISTRY: ADD YOUR JSON FILES HERE
    // ==========================================
    const chapterRegistry = [
        { title: "Number System", filename: "Number_System_PYQ.json" },
        { title: "Mixtures and Alligations", filename: "mixtures_and_alligations_PYQ.json" },
        { title: "Percentage", filename: "percentage_PYQ.json" },
        { title: "Algebra", filename: "Algebra_PYQ.json" },
        { title: "Geometry", filename: "Geometry_PYQ.json" }
    ];

    // --- THEME ENGINE ---
    const themes = ['default', 'midnight', 'vibrant', 'paper'];
    function randomizeTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'default';
        let nextTheme = currentTheme;
        
        while(nextTheme === currentTheme) {
            nextTheme = themes[Math.floor(Math.random() * themes.length)];
        }
        
        if(nextTheme === 'default') {
            document.documentElement.removeAttribute('data-theme');
        } else {
            document.documentElement.setAttribute('data-theme', nextTheme);
        }
    }

    // --- UI CONTROLS ---
    document.addEventListener("DOMContentLoaded", () => {
        const listContainer = document.getElementById('chapter-list');
        chapterRegistry.forEach(chapter => {
            const btn = document.createElement('button');
            btn.className = 'chapter-btn';
            btn.innerText = chapter.title;
            btn.onclick = () => loadChapter(chapter, btn);
            listContainer.appendChild(btn);
        });
    });

    function toggleSidebar() {
        document.getElementById('navSidebar').classList.toggle('open');
        // Close palette if open to prevent overlap
        document.getElementById('paletteSidebar').classList.remove('open'); 
    }

    function togglePalette() {
        document.getElementById('paletteSidebar').classList.toggle('open');
        // Close sidebar if open
        document.getElementById('navSidebar').classList.remove('open');
    }

    function scrollToQuestion(qId) {
        // Close the palette on mobile so they can see the question
        document.getElementById('paletteSidebar').classList.remove('open');
        
        // Scroll smoothly to the specific question
        const element = document.getElementById(qId);
        if(element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    // --- DATA LOADING & RENDERING ---
    async function loadChapter(chapter, btnElement) {
        toggleSidebar();
        document.getElementById('chapter-title').innerText = chapter.title;
        document.getElementById('content-container').innerHTML = '<div class="loader-message">Loading questions...</div>';
        
        document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
        if(btnElement) btnElement.classList.add('active');

        try {
            const response = await fetch(chapter.filename);
            if (!response.ok) throw new Error('File not found');
            const data = await response.json();
            renderContent(data);
        } catch (error) {
            document.getElementById('content-container').innerHTML = 
                `<div class="loader-message" style="color: #ff4b4b;">
                    Error loading <b>${chapter.filename}</b>.<br>
                    Make sure the file is uploaded to the same folder as this page.
                </div>`;
        }
    }

    function escapeHTML(str) {
        if (!str) return '';
        return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }

    function renderContent(data) {
        const container = document.getElementById('content-container');
        const paletteContent = document.getElementById('palette-content');
        
        container.innerHTML = '';
        paletteContent.innerHTML = ''; // Clear old palette

        data.forEach((type, typeIndex) => {
            if (type.questions && type.questions.length > 0) {
                // 1. Render Type Header on Main Page
                const typeHeader = document.createElement('div');
                typeHeader.className = 'type-header'; 
                typeHeader.innerText = type.name.toUpperCase();
                container.appendChild(typeHeader);

                // 2. Render Type Header in the Palette
                const palHeader = document.createElement('div');
                palHeader.className = 'palette-type-title';
                palHeader.innerText = type.name.toUpperCase();
                paletteContent.appendChild(palHeader);

                // 3. Create Grid Container for this Type in the Palette
                const palGrid = document.createElement('div');
                palGrid.className = 'palette-grid';
                paletteContent.appendChild(palGrid);

                // 4. Render Questions
                type.questions.forEach((q, qIndex) => {
                    // Create a unique ID for scrolling linking
                    const uniqueQId = `q-${typeIndex}-${qIndex}`;
                    const paletteBtnId = `pal-btn-${typeIndex}-${qIndex}`;

                    // --- Add Button to Palette Grid ---
                    const palBtn = document.createElement('button');
                    palBtn.className = 'grid-btn';
                    palBtn.id = paletteBtnId;
                    palBtn.innerText = qIndex + 1; // Displays 1, 2, 3...
                    palBtn.onclick = () => scrollToQuestion(uniqueQId);
                    palGrid.appendChild(palBtn);

                    // --- Build Main Question Card ---
                    const card = document.createElement('div'); 
                    card.className = 'glass-panel';
                    card.id = uniqueQId; // Assign ID here!

                    let imgHtml = '';
                    if (q.imageBase64) imgHtml = `<img src="${q.imageBase64}" class="question-image" alt="Figure" />`;

                    const safeQText = escapeHTML(q.text), safeOptA = escapeHTML(q.opt1), safeOptB = escapeHTML(q.opt2), 
                          safeOptC = escapeHTML(q.opt3), safeOptD = escapeHTML(q.opt4), safeTag = escapeHTML(q.examTag);
                    const answerText = q.correctOpt ? `Option ${q.correctOpt}` : 'No answer provided in key.';

                    let html = `
                        <div class="question-text"><strong>Q${qIndex + 1}.</strong> ${safeQText}</div>
                        ${imgHtml}
                        <div class="options-container">`;
                        
                    const opts = [
                        { letter: 'A', text: safeOptA },
                        { letter: 'B', text: safeOptB },
                        { letter: 'C', text: safeOptC },
                        { letter: 'D', text: safeOptD }
                    ];

                    opts.forEach(opt => {
                        if(opt.text && opt.text.trim() !== '') { 
                            // Notice we pass paletteBtnId so checkAnswer knows which grid button to color!
                            html += `
                            <button class="option-btn" onclick="checkAnswer(this, '${opt.letter}', '${q.correctOpt}', '${paletteBtnId}')">
                                <span><strong>${opt.letter}.</strong> ${opt.text}</span>
                                <svg class="status-icon icon-tick" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                                <svg class="status-icon icon-cross" viewBox="0 0 24 24" fill="none" stroke="#ff4b4b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>`;
                        }
                    });

                    html += `</div>`;
                    if (safeTag) html += `<div class="exam-tag">${safeTag}</div>`;

                    html += `
                        <button class="btn-primary" onclick="toggleAnswer(this)">Reveal Answer</button>
                        <div class="answer-box"><strong>Correct Answer:</strong> ${answerText}</div>
                    `;

                    card.innerHTML = html; 
                    container.appendChild(card);
                });
            }
        });

        // Fire KaTeX
        renderMathInElement(document.body, {
            delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}],
            throwOnError: false
        });
    }

    // --- INTERACTIVITY ---
    function toggleAnswer(btn) {
        const answerBox = btn.nextElementSibling; 
        answerBox.classList.toggle('visible');
        btn.innerText = answerBox.classList.contains('visible') ? 'Hide Answer' : 'Reveal Answer';
    }

    function checkAnswer(buttonElement, selectedLetter, correctLetter, paletteBtnId) {
        if (!correctLetter || correctLetter === 'undefined' || correctLetter === '') {
            alert("Teacher hasn't set the correct answer for this question yet!");
            return;
        }

        // Check the DOM for the corresponding palette button
        const palBtn = document.getElementById(paletteBtnId);

        if (selectedLetter === correctLetter) {
            buttonElement.classList.add('correct');
            buttonElement.classList.remove('wrong');
            if(palBtn) {
                palBtn.classList.add('palette-correct');
                palBtn.classList.remove('palette-wrong');
            }
        } else {
            buttonElement.classList.add('wrong');
            if(palBtn) {
                palBtn.classList.add('palette-wrong');
            }
        }
    }
</script>

</body>
</html>
